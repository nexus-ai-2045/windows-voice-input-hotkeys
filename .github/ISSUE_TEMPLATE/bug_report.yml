name: バグ報告
description: ホットキー、音声入力、Codex 整形 workflow の問題を報告する
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        報告ありがとうございます。パスワード、API key、private transcript、機密情報を含む screenshot は書かないでください。
  - type: textarea
    id: problem
    attributes:
      label: 何が起きましたか？
      description: 実際の挙動と、期待していた挙動を書いてください。
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      options:
        - シンプルな Windows 音声入力 hotkey
        - Codex で整える音声入力
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "例: Windows 11 24H2"
  - type: input
    id: ahk
    attributes:
      label: AutoHotkey version
      placeholder: "例: AutoHotkey v2.0.19 または v1.1.37"
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      description: 機密の音声入力テキストは含めないでください。
      placeholder: |
        1. ... を起動する
        2. ... を押す
        3. ... になる
  - type: textarea
    id: notes
    attributes:
      label: 補足
      description: 機密情報を含まない log や screenshot だけを載せてください。
