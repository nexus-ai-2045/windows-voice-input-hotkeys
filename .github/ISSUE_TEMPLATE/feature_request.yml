name: 機能リクエスト
description: Workflow 改善を提案する
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        提案ありがとうございます。例は汎用的にし、private な音声入力テキストは避けてください。
  - type: textarea
    id: need
    attributes:
      label: どの workflow を改善したいですか？
      description: 実装案だけでなく、ユーザーの困りごとも書いてください。
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: 期待する挙動
      description: どう動くとよいですか？
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Hotkey mapping
        - 一時入力欄
        - Codex polishing
        - Documentation
        - Other
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoff や衝突
      description: 既知の shortcut 衝突や app 固有の懸念があれば書いてください。
