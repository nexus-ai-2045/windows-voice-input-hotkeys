name: Bug report
description: Report a problem with a hotkey, dictation, or Codex polishing workflow.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include passwords, API keys, private transcripts, or screenshots with sensitive content.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow
      options:
        - Simple Windows voice typing hotkey
        - Codex-polished voice input
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
      placeholder: "Example: Windows 11 24H2"
  - type: input
    id: ahk
    attributes:
      label: AutoHotkey version
      placeholder: "Example: AutoHotkey v2.0.19 or v1.1.37"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Keep this free of sensitive dictated content.
      placeholder: |
        1. Run ...
        2. Press ...
        3. See ...
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Include only non-sensitive logs or screenshots.
